<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=div, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Crear Nuevo Post </h1>
        <form id="formularioPost">
            <div class="group">
                <label for="titulo">Titulo</label>
                <input type="text" id="titulo" required placeholder="Escribe un titulo">
            </div>
            <div class="group">
                <label for="contenido">Contenido</label>
                <textarea id="contenido" required placeholder="Escribe el cuerpo del post..."></textarea>
            </div>
            <button type="submit">Enviar post</button>
        </form>

        <div id="mensajeEstado"></div>
    </div>

    <script src="script.js"></script>

</body>
</html>
